<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H.E.E. Access Terminal</title>

<style>
body{
    background:#0b0b0b;
    color:#00ff66;
    font-family:Consolas,monospace;
    text-align:center;
    padding-top:80px;
}

.container{
    width:500px;
    margin:auto;
    border:2px solid #00aa44;
    padding:30px;
    background:#111;
}

input{
    width:250px;
    padding:10px;
    background:#000;
    color:#00ff66;
    border:1px solid #00aa44;
    font-size:18px;
    text-align:center;
}

button{
    margin-top:15px;
    padding:10px 25px;
    background:#003300;
    color:#00ff66;
    border:1px solid #00aa44;
    cursor:pointer;
}

#result{
    margin-top:30px;
    font-size:30px;
    min-height:40px;
}
</style>
</head>

<body>

<div class="container">

<h2>H.E.E. CODE TERMINAL</h2>

<p>Enter Access Code</p>

<input id="code" maxlength="10">

<br>

<button onclick="checkCode()">Submit</button>

<div id="result"></div>

</div>

<script>

function checkCode(){

let code=document.getElementById("code").value.trim();
let result=document.getElementById("result");

switch(code){

case "648":

result.innerHTML="SMILE";

setTimeout(function(){

result.innerHTML="442";

},1500);

break;

case "001":
result.innerHTML="Access Granted";
break;

case "404":
result.innerHTML="Archive Missing";
break;

case "777":
result.innerHTML="Maintenance Required";
break;

case "999":
result.innerHTML="Access Denied";
break;

default:
result.innerHTML="Unknown Code";

}

}

document.getElementById("code").addEventListener("keydown",function(e){
if(e.key==="Enter"){
checkCode();
}
});

</script>

</body>
</html>
