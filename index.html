<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>H.E.E. Internal Access Terminal</title>

<style>
body{
    margin:0;
    background:#050505;
    color:#00ff66;
    font-family:Consolas,monospace;
}

.container{
    width:700px;
    margin:60px auto;
    border:2px solid #00aa44;
    background:#101010;
    padding:30px;
    box-shadow:0 0 20px #003300;
}

h1{
    margin-top:0;
}

input{
    width:100%;
    padding:12px;
    background:black;
    color:#00ff66;
    border:1px solid #00aa44;
    font-size:18px;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    padding:10px 25px;
    background:#003300;
    color:#00ff66;
    border:1px solid #00aa44;
    cursor:pointer;
    font-family:inherit;
}

button:hover{
    background:#005500;
}

#output{
    margin-top:25px;
    min-height:170px;
    white-space:pre-wrap;
    border-top:1px solid #00aa44;
    padding-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>H.E.E. INTERNAL TERMINAL</h1>

<p>Enter Access Code or Phrase</p>

<input id="command" placeholder="ENTER CODE">

<button onclick="run()">Submit</button>

<div id="output">
Awaiting Input...
</div>

</div>

<script>

const responses={

//====================
// NUMBER CODES
//====================

"648":()=>{
show("SMILE");

setTimeout(()=>{
show("442");
},1500);
},

"442":()=>show(`SECONDARY INDEX FOUND

STATUS:
INCOMPLETE

No further information available.`),

"001":()=>show("ACCESS GRANTED"),

"101":()=>show("EMPLOYEE LOGIN VERIFIED"),

"117":()=>show("MEDICAL DEPARTMENT ONLINE"),

"132":()=>show("MAINTENANCE REQUEST QUEUED"),

"155":()=>show("ADMINISTRATIVE RECORDS LOCKED"),

"404":()=>show("ARCHIVE NOT FOUND"),

"777":()=>show(`SYSTEM MAINTENANCE

No action required.`),

"999":()=>show("ACCESS DENIED"),


//====================
// PHRASES
//====================

"hee":()=>show(`Hazard Evaluation Entity

Internal Network`),

"the factory":()=>show(`ENTRY REDACTED

CLEARANCE LEVEL TOO LOW`),

"archive":()=>show(`Searching...

No archive available.`),

"employee handbook":()=>show(`HANDBOOK

Revision 18.2

Several pages unavailable.`),

"security":()=>show(`Security Office

Clearance Required.`),

"containment":()=>show(`Containment Status

STABLE`),

"maintenance":()=>show(`Maintenance Department

No Active Requests.`),

"orientation":()=>show(`Orientation Complete.`),

"visitor":()=>show(`Visitors must remain escorted.`),

"smile":()=>show(`:)

Thank you for your cooperation.`),

"help":()=>show(`AVAILABLE COMMANDS

HELP

DIRECTORY

STATUS

LOGIN

ARCHIVE

EMPLOYEE

SECURITY`),

"status":()=>show(`Facility Status

NORMAL

Power Stable

Communications Stable`),

"directory":()=>show(`DEPARTMENTS

Security
Medical
Maintenance
Administration
Archives`),

"employee":()=>show(`Employee Database

No Matching Record.`),

"administrator":()=>show(`Administrator

Unavailable.`),

"hello":()=>show(`Welcome Employee.`),

"who are you":()=>show(`This terminal cannot answer that question.`),

"exit":()=>show("Session Closed.")

};

function show(text){
document.getElementById("output").textContent=text;
}

function run(){

let input=document.getElementById("command")
.value
.trim()
.toLowerCase();

if(responses[input]){
responses[input]();
}
else{
show(`UNKNOWN COMMAND

No results for:

"${input}"`);
}

}

document.getElementById("command").addEventListener("keydown",function(e){

if(e.key==="Enter"){
run();
}

});

</script>

</body>
</html>
